server:
  port: 8080

spring:
  application:
    name: kafka-cluster-producer
  kafka:
    # List of all cluster brokers (KRaft mode, no ZooKeeper).
    # Overridden by SPRING_KAFKA_BOOTSTRAP_SERVERS when running in Docker.
    bootstrap-servers: localhost:9092,localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

kafka:
  topics:
    test-topic: kafka-cluster-spring-test-topic
    # Number of partitions — must match the consumer's concurrency setting.
    # Partition count can only be increased, never decreased.
    partitions: 4
    # Replication factor — must not exceed the number of available brokers.
    # Scenario 1 & 2: set to 1 (single broker).  Scenario 3: 2 (two brokers).
    replication-factor: 2
  producer:
    # true  → messages carry a random integer key; Kafka routes by key hash   (Scenario 1 & 3)
    # false → messages have no key; Kafka's Sticky Partitioner distributes them (Scenario 2)
    use-keys: true

